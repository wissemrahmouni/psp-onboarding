services:
  postgres:
    image: postgres:15-alpine
    container_name: psp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - psp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: psp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@psp.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - psp_network
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psp-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/psp_db
    volumes:
      - uploads_data:/app/uploads
    networks:
      - psp_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: psp-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - psp_network
    environment:
      VITE_API_URL: /api

  nginx:
    image: nginx:alpine
    container_name: psp-nginx
    ports:
      - "80:80"
    volumes:
      # Dev sans SSL : nginx.dev.conf | Avec SSL : nginx.conf + montage ./nginx/ssl
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    networks:
      - psp_network
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:

networks:
  psp_network:
    driver: bridge
